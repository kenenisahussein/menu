<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café Elegance | Menu</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>

    <!-- Language Switcher -->
    <div class="lang-switcher">
        <select id="lang-select">
            <option value="en">English</option>
            <option value="am">አማርኛ</option>
            <option value="om">Afaan Oromoo</option>
        </select>
    </div>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1 id="hero-title">Welcome to Café Elegance</h1>
            <p id="hero-subtitle">Taste the finest flavors in town</p>
            <a href="#menu" class="btn" id="hero-btn">Explore Menu</a>
        </div>
    </section>

    <!-- Filter Buttons -->
    <section class="filter-section" id="menu">
        <div class="container">
            <h2 id="section-title">Our Menu</h2>
            <div class="filter-buttons" id="filter-buttons">
                <!-- Buttons will be generated by JS -->
            </div>
            <div class="menu-grid" id="menu-grid">
                <!-- Menu items will be inserted here by JS -->
                <div class="loading">Loading delicious items...</div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2025 Café Elegance. All rights reserved.</p>
    </footer>

    <script src="js/i18n.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
